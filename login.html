<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLED | Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0F2A44, #1F4E79); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .box { background: white; border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
        .box h1 { font-size: 3rem; color: #0F2A44; letter-spacing: 4px; margin-bottom: 4px; }
        .box .sub { color: #9CA3AF; margin-bottom: 32px; }
        .inp { width: 100%; padding: 12px 16px; border: 2px solid #E5E7EB; border-radius: 12px; font-family: 'Poppins', sans-serif; font-size: 0.95rem; background: #F9FAFB; margin-bottom: 16px; }
        .inp:focus { outline: none; border-color: #26A69A; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #26A69A, #3ac1b4); color: white; border: none; border-radius: 12px; font-family: 'Poppins', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-back { display: block; margin-top: 16px; color: #9CA3AF; text-decoration: none; }
        .btn-back:hover { color: #0F2A44; }
        #error { color: #E53935; font-size: 0.85rem; min-height: 20px; margin-top: 8px; }
        .info { background: #F0F9FF; border-radius: 12px; padding: 16px; margin-top: 24px; font-size: 0.8rem; color: #1F4E79; border: 1px solid #BAE6FD; text-align: left; }
        .info strong { display: block; margin-bottom: 8px; }
        code { background: #E5E7EB; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>CLED</h1>
        <p class="sub">Liderazgo · Expresión · Desarrollo</p>
        <input class="inp" type="text" id="user" placeholder="Usuario o Código" autocomplete="off" onkeypress="if(event.key==='Enter'){event.preventDefault();login();}">
        <input class="inp" type="password" id="pass" placeholder="Contraseña" autocomplete="off" onkeypress="if(event.key==='Enter'){event.preventDefault();login();}">
        <div id="error"></div>
        <button class="btn" id="btn" onclick="login()">INICIAR SESIÓN</button>
        <a href="index.html" class="btn-back">← Volver al sitio público</a>
        <div class="info">
            <strong>🔑 Acceso al sistema:</strong>
            Admin: <code>ADM001</code> / <code>admin123</code><br>
            Protocolo: <code>PRO001</code> / <code>pro123</code>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        document.addEventListener('submit', function(e){ e.preventDefault(); return false; });

        // Verificar sesión existente
        (function(){
            var s = localStorage.getItem('CLED_SESSION');
            if (s) {
                try {
                    var u = JSON.parse(s);
                    localStorage.setItem('CLED_REDIRECT', u.rol);
                    window.location.replace('index.html');
                } catch(e) { localStorage.removeItem('CLED_SESSION'); }
            }
        })();

        async function login() {
            var u = document.getElementById('user').value.trim();
            var p = document.getElementById('pass').value.trim();
            var err = document.getElementById('error');
            var btn = document.getElementById('btn');
            err.textContent = '';
            if (!u || !p) { err.textContent = '❌ Completa todos los campos'; return; }
            btn.disabled = true; btn.textContent = 'Verificando...';

            // Intentar con API de Supabase
            if (typeof API !== 'undefined') {
                var result = await API.login(u, p);
                if (result.success) {
                    localStorage.setItem('CLED_REDIRECT', result.member.rol);
                    window.location.replace('index.html');
                    return;
                }
            }

            // Fallback: buscar en localStorage
            var miembros = JSON.parse(localStorage.getItem('CLED_MIEMBROS') || '[]');
            for (var i = 0; i < miembros.length; i++) {
                var m = miembros[i];
                if ((m.codigo === u || m.username === u || m.id === u) && (m.password === p || m.pass === p)) {
                    var sesion = {
                        id: m.id, codigo: m.codigo || m.username,
                        nombre: m.nombre || (m.nombres + ' ' + m.apellidos),
                        email: m.email, rol: m.rol || 'Participante',
                        club: m.club || 'TODOS', clubId: m.clubId || null,
                        estado: m.estado, tutorialVisto: m.tutorialVisto || false,
                        terminosAceptados: m.terminosAceptados || false
                    };
                    localStorage.setItem('CLED_SESSION', JSON.stringify(sesion));
                    localStorage.setItem('CLED_REDIRECT', sesion.rol);
                    window.location.replace('index.html');
                    return;
                }
            }

            err.textContent = '❌ Credenciales incorrectas';
            btn.disabled = false; btn.textContent = 'INICIAR SESIÓN';
        }
    </script>
</body>
</html>
